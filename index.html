<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<title>glTF Viewer</title>
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0"
	/>
	<meta name="author" content="Don McCurdy" />
	<meta name="description" content="Drag-and-drop preview tool for glTF 2.0 3D models." />
	<link rel="canonical" href="https://gltf-viewer.donmccurdy.com/" />
	<link rel="shortcut icon" href="/favicon.ico" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap"
		rel="stylesheet"
	/>
	<link rel="stylesheet" href="style.css" />
	<script defer type="module" src="src/app.js"></script>
</head>
<body data-accent="amber" data-menu-open="false">
	<!-- 3D viewport layer -->
	<main class="wrap">
		<div class="dropzone">
			<header class="dropzone__header">
				<h1 class="dropzone__title">
					<span class="dropzone__title-text">glTF Viewer</span>
				</h1>
				<p class="dropzone__sub">Load a model to begin</p>
			</header>

			<div class="placeholder dropzone__target" role="group" aria-label="Drop target">
				<svg class="dropzone__glyph" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
					<path d="M32 44 L32 20 M22 30 L32 20 L42 30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" />
					<line x1="20" y1="48" x2="44" y2="48" stroke="currentColor" stroke-width="2" stroke-linecap="square" />
				</svg>

				<p>Drag a .gltf, .glb, or .zip file here</p>
				<div class="upload-btn">
					<input type="file" name="file-input[]" id="file-input" multiple />
					<label for="file-input"><span>Choose file</span></label>
				</div>
			</div>

			<footer class="dropzone__footer">
				<span class="dropzone__hint">Supports .gltf / .glb / .zip</span>
			</footer>
		</div>
		<div class="spinner"></div>
	</main>

	<!-- Settings overlay -->
	<section class="pm" aria-label="Settings Menu" aria-modal="false">
		<div class="pm__backdrop" aria-hidden="true"></div>

		<!-- Single header strip: brand-left | tabs-centered | meta-right.
		     Mirrors the reference pause-menu header lockup where the brand
		     and tab nav share one row instead of stacking vertically. -->
		<header class="pm__header">
			<div class="pm__brand">
				<span class="pm__brand-title">GLTF VIEWER</span>
				<!-- Session chip: filled white block (reference STORY/ONLINE
				     selected-tab treatment). Populated with the loaded glTF
				     filename by app.js; hidden when empty. -->
				<span class="pm__session" id="pm-session" aria-live="polite"></span>
			</div>

			<nav class="pm__tabs" id="pm-tabs" role="tablist" aria-label="Menu sections"></nav>

			<div class="pm__meta">
				<div class="pm__swatches" role="radiogroup" aria-label="Accent color">
					<button class="pm__swatch" data-accent="amber" aria-label="Amber accent" title="Amber"></button>
					<button class="pm__swatch" data-accent="michael" aria-label="Michael blue accent" title="Michael Blue"></button>
					<button class="pm__swatch" data-accent="franklin" aria-label="Franklin green accent" title="Franklin Green"></button>
					<button class="pm__swatch" data-accent="trevor" aria-label="Trevor orange accent" title="Trevor Orange"></button>
				</div>
				<button class="pm__close" id="pm-close" type="button" aria-label="Close settings menu" title="Close">
					<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
						<path d="M5 5 L19 19 M19 5 L5 19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" />
					</svg>
				</button>
			</div>
		</header>

		<div class="pm__body">
			<aside class="pm__rail" id="pm-rail" role="tablist" aria-label="Settings"></aside>
			<main class="pm__pane" id="pm-pane" role="tabpanel"></main>
		</div>

		<footer class="pm__footer">
			<button class="pm__share" id="pm-share" type="button" aria-label="Copy shareable link to clipboard">Copy link</button>
			<span class="pm__spacer"></span>
			<div class="pm__actions" id="pm-actions" role="group" aria-label="Contextual actions"></div>
		</footer>
	</section>

	<!-- Top-right control cluster: HUD sits to the LEFT, then the
	     APPEARANCE button (standalone Character-Creator-style overlay
	     for live model tuning), then the MENU button. All three are
	     always visible once a model is loaded. -->
	<div class="topbar-cluster" id="topbar-cluster">
		<div class="hud" id="hud" role="group" aria-label="Performance HUD" aria-hidden="true" hidden></div>

		<button class="cc__toggle" id="cc-toggle" type="button" aria-label="Open appearance editor" aria-expanded="false" aria-controls="cc-card">
			<span>Appearance</span>
		</button>

		<button class="pm__toggle" id="pm-toggle" aria-label="Open settings menu">
			<span>Menu</span>
		</button>
	</div>

	<!-- Standalone Character-Creator card — floating overlay independent
	     of the main settings menu. Mirrors /Users/ritvik/Downloads/ui/
	     character.jsx structure. Toggled by .cc__toggle; its body is
	     populated by viewer.js (_renderCcCard). -->
	<aside class="cc" id="cc-card" aria-label="Appearance editor" aria-hidden="true" hidden></aside>

	<!-- Toast notifications container (for errors/status) -->
	<div class="pm__toasts" id="pm-toasts" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
